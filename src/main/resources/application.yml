# Database Configuration
spring:
  datasource:
    url: jdbc:h2:mem:blogdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  
  # H2 Console (для отладки)
h2.console:
  enabled: true


  # Logging
logging.level:
  root: INFO
  com.myblog: DEBUG

server:
  servlet:
    context-path: /api